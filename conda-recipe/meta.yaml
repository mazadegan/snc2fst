{% set name = "snc2fst" %}
{% set version = "1.1.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  path: ..

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - snc2fst = snc2fst.cli:main
    - snc = snc2fst.cli:main

requirements:
  host:
    - python >=3.12
    - pip
    - setuptools >=61.0
  run:
    - python >=3.12
    - click >=8.0.0
    - prettytable >=3.0.0
    - pydantic >=2.0.0
    - questionary >=2.0.0
    - langcodes >=3.3.0
    - fastapi >=0.100.0
    - uvicorn >=0.20.0
    - jinja2 >=3.0.0
    - python-multipart >=0.0.9
    - pynini

test:
  imports:
    - snc2fst
  commands:
    - snc --help
    - snc --version
    - python -c "import fastapi, uvicorn, jinja2, multipart"

about:
  home: https://github.com/mazadegan/snc2fst
  license: Apache-2.0
  license_file: LICENSE
  summary: Compiles Search-and-Change grammars to OpenFST transducers.
