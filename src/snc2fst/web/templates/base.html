<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}snc2fst{% endblock %}</title>
  <script>
    (function () {
      const stored = localStorage.getItem('snc-theme');
      const theme = stored || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="stylesheet" href="/static/codemirror.min.css">
  <link rel="stylesheet" href="https://unpkg.com/tabulator-tables@6.2.5/dist/css/tabulator.min.css">
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/codemirror.min.js"></script>
  <script src="/static/mode/toml.min.js"></script>
  <script src="/static/mode/csv.min.js"></script>
  <script src="https://unpkg.com/tabulator-tables@6.2.5/dist/js/tabulator.min.js"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  {% block body %}{% endblock %}
  <script>
    (function () {
      const root = document.documentElement;
      const button = document.getElementById('theme-toggle');

      function applyTheme(theme) {
        root.dataset.theme = theme;
        localStorage.setItem('snc-theme', theme);
        if (button) {
          const nextTheme = theme === 'light' ? 'dark' : 'light';
          const icon = theme === 'light' ? 'moon' : 'sun';
          button.innerHTML = '<i data-lucide="' + icon + '" class="statusbar-icon" aria-hidden="true"></i>';
          button.setAttribute('aria-label', 'Switch to ' + nextTheme + ' theme');
          button.setAttribute('title', 'Switch to ' + nextTheme + ' theme');
          button.setAttribute('aria-pressed', String(theme === 'light'));
        }
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }

      if (button) {
        button.addEventListener('click', function () {
          applyTheme(root.dataset.theme === 'light' ? 'dark' : 'light');
        });
      }

      applyTheme(root.dataset.theme || 'dark');

      if (window.lucide) {
        document.body.addEventListener('htmx:afterSwap', function () {
          window.lucide.createIcons();
        });
      }
    })();
  </script>
</body>
</html>
