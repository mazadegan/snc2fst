{% if ok and not warnings %}
<span class="status-ok">&#10003; No errors</span>
{% else %}
<div class="problems-wrap">
  <button
    type="button"
    class="problems-toggle"
    data-problems-toggle
    aria-expanded="false"
    aria-haspopup="dialog">
    {% if errors %}
    <span class="status-error">&#10007; {{ errors | length }} error{{ 's' if errors | length != 1 else '' }}</span>
    {% endif %}
    {% if warnings %}
    <span class="status-warning">&#9888; {{ warnings | length }} warning{{ 's' if warnings | length != 1 else '' }}</span>
    {% endif %}
  </button>
  <div class="problems-popover hidden" data-problems-popover role="dialog" aria-label="Problems">
    <div class="problems-header">Problems</div>
    {% if errors %}
    <div class="problems-group">
      <div class="problems-group-title status-error">Errors</div>
      <ul class="problems-list">
        {% for error in errors %}
        <li class="problems-item">{{ error }}</li>
        {% endfor %}
      </ul>
    </div>
    {% endif %}
    {% if warnings %}
    <div class="problems-group">
      <div class="problems-group-title status-warning">Warnings</div>
      <ul class="problems-list">
        {% for warning in warnings %}
        <li class="problems-item">{{ warning }}</li>
        {% endfor %}
      </ul>
    </div>
    {% endif %}
  </div>
</div>
{% endif %}
