alphabet_path = "alphabet.csv"
tests_path = "tests.csv"

[meta]
title = "English past tense allomorphy"
language = "eng"
description = "Schwa epenthesis between identical coronal stops, followed by voicing harmony of the past tense suffix /D/."
path_to_readme = "."
sources = ["Hayes, B. (2009). Introductory Phonology. Wiley-Blackwell. Section 6.3."]
compilable = true

# R1: Schwa epenthesis between coronal stops (d, t)
[[rules]]
Id = "R1"
Inr = [["-Sonorant", "+Coronal", "-Continuant"], ["-Sonorant", "+Coronal", "-Continuant"]]
Trm = []
Dir = "L"
Out = "(INR[1] &ə INR[2])"

# R2: Voicing harmony
[[rules]]
Id = "R2"
Inr = [["-Sonorant", "+Coronal", "-Continuant"]]
Trm = [[]]
Dir = "L"
Out = "(unify INR[1] (proj TRM[1] (Voice)))"
