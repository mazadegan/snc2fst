alphabet_path = "alphabet.csv"
tests_path = "tests.tsv"

[meta]
title = "Georgian lateral harmony"
language = "kat"
description = "Front/back alternation of the lateral /l̃/ before front vs. back vowels."
sources = ["Kenstowicz & Kisseberth (1979), Generative Phonology, Ch. 2, Exercise 1"]

[[rules]]
Id = "R1"
Dir = "R"
Inr = [["+Lateral", "+Dorsal"]]
Trm = [[]]
Out = """
  (if (in? (nth 1 TRM) [-Back])
    (unify (subtract (nth 1 INR) [+Dorsal]) [-Dorsal])
    INR)
"""
