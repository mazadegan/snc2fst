alphabet_path = "alphabet.csv"
tests_path = "tests.tsv"

[meta]
title = "Votic vowel harmony"
language = "vot"
description = "Back vowel harmony in Votic: suffix vowels agree in backness with the nearest preceding vowel trigger."
sources = ["Leduc, Reiss & Volenec (2020), Votic vowel harmony in Substance Free Logical Phonology. The Oxford Handbook of Vowel Harmony. LingBuzz/005339."]

# R1: copy Back from the nearest preceding non-high vowel
[[rules]]
Id = "R1"
Dir = "L"
Inr = [["+Syllabic"]]
Trm = [["+Syllabic", "-High"]]
Out = "(unify INR[1] (proj TRM[1] (Back)))"

# R2: copy Back from the nearest preceding high round vowel
[[rules]]
Id = "R2"
Dir = "L"
Inr = [["+Syllabic"]]
Trm = [["+Syllabic", "+High", "+Round"]]
Out = "(unify INR[1] (proj TRM[1] (Back)))"

# R3: default — assign -Back when no harmony trigger is found
[[rules]]
Id = "R3"
Dir = "L"
Inr = [["+Syllabic"]]
Trm = [[]]
Out = "(unify INR[1] {-Back})"
