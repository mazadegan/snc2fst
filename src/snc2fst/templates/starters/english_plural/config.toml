alphabet_path = "alphabet.csv"
tests_path = "tests.csv"

[meta]
title = "English plural allomorphy"
language = "eng"
description = "Schwa epenthesis after stridents and distributed coronals, followed by voicing harmony of the plural suffix /S/."
path_to_readme = "."
sources = ["Kenstowicz & Kisseberth (1979), Generative Phonology, Ch. 1, p. 16"]
compilable = true

# R1a: Schwa epenthesis after stridents (s, z)
[[rules]]
Id = "R1a"
Dir = "L"
Inr = [["-Labial", "+Strident"], ["-Syllabic", "+Strident"]]
Trm = []
Out = "(INR[1] &ə INR[2])"

# R1b: Schwa epenthesis after distributed coronals (ʃ, ʒ)
[[rules]]
Id = "R1b"
Dir = "L"
Inr = [["+Coronal", "+Distributed"], ["-Syllabic", "+Strident"]]
Trm = []
Out = "(INR[1] &ə INR[2])"

# R2: Voicing harmony
[[rules]]
Id = "R2"
Dir = "L"
Inr = [["-Syllabic"]]
Trm = [[]]
Out = "(unify INR[1] (proj TRM[1] (Voice)))"
